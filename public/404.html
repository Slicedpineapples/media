<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Share" />
  <meta name="format-detection" content="telephone=no" />
  <title>Share - Not Found</title>
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/share-icon.svg" />
  <link rel="icon" href="/icons/share-icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #080808;
      --surface-2: #0d0d0d;
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.2);
      --text: #f1f1f3;
      --muted: #8d8e94;
      --muted-2: #666870;
      --blue: #6da5ff;
      --blue-soft: rgba(109, 165, 255, 0.14);
      --blue-border: rgba(109, 165, 255, 0.38);
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'EB Garamond', Georgia, serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    svg {
      display: block;
      flex: 0 0 auto;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-nav {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.9);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(100%, 1360px);
      min-height: 70px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 48px 0;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .brand svg {
      width: 26px;
      height: 26px;
      color: var(--blue);
    }

    .nav-code {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 72px 36px;
    }

    .not-found {
      width: min(100%, 720px);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 14px;
      border: 1px solid rgba(109, 165, 255, 0.36);
      border-radius: 999px;
      background: rgba(109, 165, 255, 0.06);
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1 {
      margin-top: 30px;
      font-family: var(--serif);
      font-size: 44px;
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0;
      transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .btn.primary {
      border-color: rgba(109, 165, 255, 0.42);
      background: rgba(109, 165, 255, 0.14);
      color: #dceaff;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--blue-border);
      background: var(--blue-soft);
      color: #dceaff;
    }

    .site-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px 18px;
      padding: 0 24px max(28px, env(safe-area-inset-bottom));
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .site-footer a {
      color: var(--muted);
      transition: color 0.18s ease;
    }

    .site-footer a:hover { color: var(--blue); }

    .footer-divider {
      width: 1px;
      height: 12px;
      background: var(--border);
    }

    @media (max-width: 820px) {
      .nav-inner {
        min-height: calc(58px + env(safe-area-inset-top));
        padding: calc(env(safe-area-inset-top) + 0px) 16px 0;
      }

      main {
        padding: 58px 16px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 12px;
      }

      .actions {
        width: min(100%, 340px);
        margin-inline: auto;
      }

      .btn {
        flex: 1 1 0;
        min-width: 0;
        font-size: 10px;
      }

      .site-footer {
        flex-direction: column;
        gap: 10px;
        line-height: 1.5;
      }

      .footer-divider {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .brand {
        gap: 10px;
        font-size: 12px;
      }

      .brand svg {
        width: 24px;
        height: 24px;
      }

      .badge {
        font-size: 9px;
      }

      h1 {
        font-size: 30px;
      }

      .actions {
        gap: 10px;
      }

      .btn {
        flex-basis: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-nav">
      <div class="nav-inner">
        <a class="brand" href="/" aria-label="Share home">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 7.5c0-1.1.9-2 2-2h4.35c.57 0 1.11.24 1.49.67l1.08 1.21c.38.43.92.67 1.49.67H19c1.1 0 2 .9 2 2v6.45c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
          </svg>
          <span>Share</span>
        </a>
        <span class="nav-code">404</span>
      </div>
    </header>

    <main>
      <section class="not-found" aria-labelledby="not-found-title">
        <div class="badge">Page not found</div>
        <h1 id="not-found-title">This link does not exist.</h1>
        <p>The page or media link you opened is not available. Return home, or open the dashboard if you already have a valid session.</p>
        <div class="actions">
          <a class="btn primary" href="/">Home</a>
          <a class="btn" href="/dashboard" id="dashboardLink">Dashboard</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>a product of <a href="https://softwarepulses.com" target="_blank" rel="noopener">Software Pulses</a></span>
      <span class="footer-divider" aria-hidden="true"></span>
      <span>&copy; <span id="currentYear"></span> Share</span>
      <span class="footer-divider" aria-hidden="true"></span>
      <a href="https://softwarepulses.com/terms-of-use" target="_blank" rel="noopener">Legal</a>
    </footer>
  </div>

  <script>
    const currentYear = document.getElementById('currentYear');
    const dashboardLink = document.getElementById('dashboardLink');

    currentYear.textContent = new Date().getFullYear();

    function decodeToken(token) {
      try {
        const payload = token.split('.')[1];
        const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
        const padded = normalized.padEnd(normalized.length + ((4 - normalized.length % 4) % 4), '=');
        return JSON.parse(atob(padded));
      } catch {
        return null;
      }
    }

    const token = localStorage.getItem('token');
    const payload = token ? decodeToken(token) : null;
    const isExpired = payload && payload.exp && Date.now() >= payload.exp * 1000;

    if (!payload || isExpired) {
      localStorage.removeItem('token');
      localStorage.removeItem('currentFolder');
      dashboardLink.textContent = 'Sign in';
      dashboardLink.href = '/';
    } else if (payload.username) {
      dashboardLink.textContent = payload.username;
      dashboardLink.setAttribute('aria-label', `Open dashboard for ${payload.username}`);
    }
  </script>
  <script src="/pwa.js" defer></script>
</body>
</html>
