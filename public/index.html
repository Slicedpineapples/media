<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDIA — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0b;
      --surface: #131312;
      --border: #2a2a28;
      --amber: #c8a96e;
      --amber-dim: #7a6340;
      --text: #e8e4dc;
      --muted: #6b6860;
      --error: #c46a55;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'EB Garamond', Georgia, serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel — editorial */
    .panel-left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      border-right: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--amber);
      text-transform: uppercase;
    }

    .headline {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 4vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
    }

    .headline em {
      font-style: italic;
      color: var(--amber);
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Right panel — form */
    .panel-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .form-card {
      width: 100%;
      max-width: 360px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.5s ease 0.1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header {
      margin-bottom: 40px;
    }

    .form-header h2 {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-header p {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: var(--text);
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.08);
    }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(196, 106, 85, 0.08);
      border: 1px solid rgba(196, 106, 85, 0.3);
      color: var(--error);
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .error-msg.visible { display: flex; }

    .error-msg::before {
      content: '!';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid var(--error);
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--amber);
      color: #0c0c0b;
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #d4b87a; }
    button[type="submit"]:active { background: #b8963e; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(12,12,11,0.3);
      border-top-color: #0c0c0b;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    button.loading .btn-text { display: none; }
    button.loading .spinner { display: block; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--bg);
      z-index: 100;
    }

    footer a {
      color: var(--amber);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text); }

    /* Responsive */
    @media (max-width: 640px) {
      .page { grid-template-columns: 1fr; }
      .panel-left { display: none; }
      .panel-right { padding: 32px 24px; align-items: flex-start; padding-top: 64px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel-left">
      <div class="wordmark">Media</div>
      <div>
        <h1 class="headline">Your files,<br /><em>your rules.</em></h1>
      </div>
      <div class="tagline">Secure · Fast · Linkable</div>
    </aside>

    <main class="panel-right">
      <div class="form-card">
        <div class="form-header">
          <h2>Access portal</h2>
          <p>Sign in to continue</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="error-msg" id="errorMsg" role="alert"></div>

          <div class="field">
            <label for="username">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="admin"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" id="submitBtn">
            <span class="btn-text">Sign In →</span>
            <span class="spinner"></span>
          </button>
        </form>

        <div class="divider"><span>v1.0</span></div>
      </div>
    </main>
  </div>

  <footer>
    a product of <a href="https://softwarepulses.com" target="_blank" rel="noopener">softwarepulses</a>
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please fill in all fields.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Invalid credentials.');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.removeItem('currentFolder');
        window.location.href = '/dashboard';
      } catch {
        showError('Could not reach the server. Try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
