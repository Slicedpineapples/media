<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Share" />
  <title>Share - Offline</title>
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/share-icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #000; color: #f1f1f3; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
    body { display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom)); text-align: center; }
    main { width: min(100%, 360px); }
    .icon { display: grid; place-items: center; width: 58px; height: 58px; margin: 0 auto 22px; border-radius: 16px; background: rgba(10, 132, 255, 0.14); color: #6da5ff; }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-size: 18px; line-height: 1.2; font-weight: 700; letter-spacing: 0; }
    p { margin-top: 12px; color: #8e8e93; font-size: 13px; line-height: 1.6; }
    a { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; margin-top: 24px; padding: 0 16px; border: 1px solid rgba(109, 165, 255, 0.38); border-radius: 14px; background: rgba(109, 165, 255, 0.14); color: #dceaff; font-size: 11px; font-weight: 700; text-decoration: none; text-transform: uppercase; }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 7.5c0-1.1.9-2 2-2h4.35c.57 0 1.11.24 1.49.67l1.08 1.21c.38.43.92.67 1.49.67H19c1.1 0 2 .9 2 2v6.45c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
      </svg>
    </div>
    <h1>Share is offline.</h1>
    <p>Reconnect to load files, upload media, or refresh your dashboard.</p>
    <a href="/">Go Home</a>
  </main>
</body>
</html>
