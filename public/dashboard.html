<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Share" />
  <meta name="format-detection" content="telephone=no" />
  <title>Share — Dashboard</title>
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/share-icon.svg" />
  <link rel="icon" href="/icons/share-icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div class="layout">
    <nav>
      <div class="wordmark">Share</div>
      <div class="nav-right">
        <span class="nav-label" id="navUser"></span>
        <button class="btn-logout" id="logoutBtn">Sign out</button>
      </div>
    </nav>

    <main class="drop-zone" id="dropZone">
      <!-- Toolbar -->
      <section class="finder-toolbar">
        <div class="toolbar-nav">
          <button class="toolbar-btn icon" id="backBtn" type="button" aria-label="Back">
            <span class="nav-chevron back" aria-hidden="true"></span>
          </button>
          <button class="toolbar-btn icon" id="forwardBtn" type="button" aria-label="Forward">
            <span class="nav-chevron forward" aria-hidden="true"></span>
          </button>
        </div>
        <div class="dir-title" id="dirTitle">Home</div>
        <div class="mobile-actions" id="mobileActions">
          <button class="mobile-actions-btn" id="mobileActionsBtn" type="button" aria-label="More actions" aria-expanded="false">
            <span class="ellipsis-icon" aria-hidden="true">
              <span class="ellipsis-dot"></span>
              <span class="ellipsis-dot"></span>
              <span class="ellipsis-dot"></span>
            </span>
          </button>
          <div class="mobile-actions-menu" id="mobileActionsMenu" hidden>
            <button type="button" data-mobile-action="new-folder">New Folder</button>
            <button type="button" data-mobile-action="upload-file">Upload File</button>
            <button type="button" data-mobile-action="upload-folder">Upload Folder</button>
            <button type="button" data-mobile-action="select" id="mobileSelectAction">Select</button>
            <button type="button" data-mobile-action="delete" id="mobileDeleteAction" disabled>Delete Selected</button>
            <button type="button" data-mobile-action="logout">Sign Out</button>
          </div>
        </div>
        <input class="toolbar-search" id="searchInput" type="search" placeholder="Search" />
        <button class="toolbar-btn" id="createFolderBtn" type="button">New Folder</button>
        <button class="toolbar-btn" id="uploadBtn" type="button">Upload</button>
        <button class="toolbar-btn" id="uploadFolderBtn" type="button">Folder</button>
        <button class="toolbar-btn" id="selectBtn" type="button">Select</button>
        <button class="toolbar-btn danger" id="deleteBtn" type="button" disabled>Delete</button>
        <input class="file-input-hidden" type="file" id="fileInput" multiple />
        <input class="file-input-hidden" type="file" id="folderInput" webkitdirectory directory multiple />
        <div class="current-folder-note" id="currentFolderNote"></div>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
      </section>

      <!-- Files -->
      <section class="files-section">
        <div class="browser-bar">
          <div class="breadcrumbs" id="breadcrumbs"></div>
          <span class="file-count" id="fileCount"></span>
        </div>
        <div class="explorer-body" id="explorerBody">
          <div class="file-list" id="fileList">
            <div class="empty-state">
              <span class="spinner-inline"></span>
              <span style="font-size:12px;color:var(--muted)">Loading…</span>
            </div>
          </div>
          <aside class="preview-panel" id="previewPanel">
            <div class="preview-frame" id="previewFrame">
              <div class="preview-placeholder">
                <div class="preview-placeholder-icon" aria-hidden="true"></div>
                <span class="preview-placeholder-label">Preview</span>
              </div>
            </div>
            <div class="preview-name" id="previewName">No file selected</div>
            <div class="preview-meta" id="previewMeta">Select a file to see its details.</div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <footer>
    a product of <a href="https://softwarepulses.com" target="_blank" rel="noopener">softwarepulses</a>
  </footer>

  <script type="module" src="/js/dashboard.js"></script>
  <script src="/pwa.js" defer></script>
</body>
</html>
