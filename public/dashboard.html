<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Share" />
  <meta name="format-detection" content="telephone=no" />
  <title>Share — Dashboard</title>
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/share-icon.svg" />
  <link rel="icon" href="/icons/share-icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0b;
      --surface: #131312;
      --surface2: #1a1a18;
      --border: #2a2a28;
      --amber: #c8a96e;
      --amber-dim: #7a6340;
      --text: #e8e4dc;
      --muted: #6b6860;
      --error: #c46a55;
      --success: #6a9e6e;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'EB Garamond', Georgia, serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }

    .layout {
      position: relative;
      z-index: 1;
      width: min(100%, 1680px);
      margin: 0 auto;
      padding: 0 clamp(24px, 4vw, 64px) 80px;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--amber);
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .btn-logout {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: var(--text); border-color: var(--muted); }

    /* Section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .current-folder-note {
      display: none;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Upload progress */
    .upload-status {
      grid-column: 1 / -1;
      margin-top: 12px;
      font-size: 12px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    .upload-status.error { color: var(--error); }
    .upload-status.success { color: var(--success); }

    .progress-bar-wrap {
      grid-column: 1 / -1;
      height: 2px;
      background: var(--border);
      margin-top: 12px;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: var(--amber);
      width: 0%;
      transition: width 0.2s;
    }

    .finder-toolbar {
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) minmax(180px, 340px) auto auto auto auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 24px;
      padding: 10px;
      border: 1px solid var(--border);
      background: rgba(19,19,18,0.82);
    }

    .toolbar-nav {
      display: flex;
      gap: 6px;
    }

    .dir-title {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-search {
      width: 100%;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }

    .toolbar-search:focus { border-color: var(--amber-dim); }

    .toolbar-btn {
      min-height: 34px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .toolbar-btn,
    .btn-copy,
    .btn-open {
      touch-action: manipulation;
    }

    .toolbar-btn.icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      padding: 0;
      font-size: 16px;
      letter-spacing: 0;
      text-transform: none;
    }

    .nav-chevron {
      width: 9px;
      height: 9px;
      border-style: solid;
      border-color: currentColor;
      border-width: 0 0 2px 2px;
    }

    .nav-chevron.back { transform: rotate(45deg); }
    .nav-chevron.forward { transform: rotate(225deg); }

    .toolbar-btn:hover:not(:disabled),
    .toolbar-btn.active {
      color: var(--amber);
      border-color: var(--amber-dim);
    }

    .toolbar-btn.danger:hover:not(:disabled) {
      color: var(--error);
      border-color: var(--error);
    }

    .toolbar-btn:disabled {
      opacity: 0.36;
      cursor: not-allowed;
    }

    .mobile-actions { display: none; }

    .file-input-hidden { display: none; }

    /* Explorer */
    .files-section {}

    .browser-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .crumb {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .crumb:hover { color: var(--amber); }

    .crumb-separator {
      color: var(--border);
      font-size: 11px;
    }

    .file-count {
      font-size: 11px;
      color: var(--muted);
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 0 42px;
    }

    .content-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 32px;
      margin-top: 6px;
    }

    .content-section-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .content-section-count {
      margin-left: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .file-sort {
      min-height: 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 0 28px 0 9px;
      cursor: pointer;
      outline: none;
    }

    .file-sort:focus {
      border-color: var(--amber-dim);
    }

    .drop-zone {
      position: relative;
      outline: 1px solid transparent;
      outline-offset: 8px;
      transition: outline-color 0.12s, background 0.12s;
    }

    .drop-zone.drag-over {
      outline-color: var(--amber-dim);
      background: rgba(200, 169, 110, 0.04);
    }

    .explorer-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .explorer-body.preview-open {
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
    }

    .preview-panel {
      display: none;
      position: sticky;
      top: 18px;
      min-height: 360px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 16px;
    }

    .preview-panel.open {
      display: block;
    }

    .preview-frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .preview-frame img,
    .preview-frame video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .preview-frame audio {
      width: calc(100% - 24px);
    }

    .preview-name {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      margin-bottom: 10px;
    }

    .preview-meta {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 34px 28px;
      padding: 12px 0 28px;
    }

    .explorer-item {
      display: grid;
      grid-template-columns: 32px 74px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-width: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 12px;
      position: relative;
      transition: border-color 0.12s, background 0.12s;
      animation: fadeIn 0.2s ease both;
      text-align: left;
      border-radius: 0;
    }

    .file-row {
      grid-template-columns: 44px minmax(180px, 1fr) auto 96px 152px 84px;
    }

    .file-header-row {
      display: grid;
      grid-template-columns: 44px minmax(180px, 1fr) auto 96px 152px 84px;
      gap: 14px;
      align-items: center;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .folder-grid .explorer-item {
      grid-template-columns: 1fr;
      grid-template-rows: 78px auto;
      justify-items: center;
      gap: 10px;
      min-height: 122px;
      border-color: transparent;
      background: transparent;
      text-align: center;
    }

    .folder-grid .explorer-item:hover {
      background: rgba(255,255,255,0.03);
      border-color: var(--border);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .explorer-item:hover {
      background: rgba(255,255,255,0.03);
      border-color: var(--border);
    }

    .explorer-item.selected {
      background: rgba(200,169,110,0.1);
      border-color: var(--amber-dim);
    }

    .selection-mark {
      display: flex;
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--bg);
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
    }

    .selecting .selection-mark { opacity: 1; }

    .explorer-item.selected .selection-mark {
      background: var(--amber);
      border-color: var(--amber);
    }

    .folder-item {
      cursor: pointer;
    }

    .file-index {
      display: none;
    }

    .file-row .file-index {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .folder-icon,
    .file-preview {
      width: 64px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .folder-icon {
      position: relative;
      border: 0;
      border-radius: 7px;
      background: linear-gradient(#73d4ff, #30aee4);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.65), inset 0 -3px 0 rgba(0,0,0,0.08), 0 12px 22px rgba(0,0,0,0.22);
    }

    .folder-icon::before {
      content: '';
      position: absolute;
      left: 0;
      top: -7px;
      width: 28px;
      height: 13px;
      border-radius: 5px 7px 0 0;
      background: linear-gradient(#7bdcff, #46bdeb);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.55);
    }

    .folder-icon::after {
      content: '';
      position: absolute;
      left: 4px;
      right: 4px;
      top: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
    }

    .file-preview img,
    .file-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .file-info { min-width: 0; }

    .file-name {
      width: 100%;
      max-width: none;
      font-size: 14px;
      line-height: 1.3;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .folder-grid .file-name {
      max-width: 140px;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow-wrap: anywhere;
    }

    .file-url {
      display: none;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-folder {
      display: inline-block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .item-kind {
      display: none;
    }

    .file-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      opacity: 1;
      transition: opacity 0.12s;
    }

    .explorer-item:hover .file-actions { opacity: 1; }

    .file-size,
    .file-date {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .btn-copy {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      white-space: nowrap;
    }

    .btn-copy:hover { color: var(--amber); border-color: var(--amber-dim); }
    .btn-copy.copied { color: var(--success); border-color: var(--success); background: rgba(106,158,110,0.06); }

    .btn-open {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: color 0.12s, border-color 0.12s;
    }

    .btn-open:hover { color: var(--text); border-color: var(--muted); }

    @media (max-width: 980px) {
      .finder-toolbar {
        grid-template-columns: auto minmax(0, 1fr) auto auto;
      }

      .toolbar-nav { grid-column: 1; }
      .dir-title { grid-column: 2 / -1; }
      .toolbar-search { grid-column: 1 / -1; }

      .toolbar-btn {
        min-height: 38px;
      }

      .explorer-body.preview-open {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        position: static;
      }

      .preview-panel.open {
        order: -1;
      }

      .file-row,
      .file-header-row {
        grid-template-columns: 40px minmax(180px, 1fr) auto 86px 132px 76px;
      }
    }

    @media (max-width: 640px) {
      html, body {
        min-height: 100%;
      }

      .layout {
        padding: 0 14px 76px;
      }

      nav {
        padding: 18px 0;
        margin-bottom: 18px;
        gap: 14px;
      }

      .nav-right {
        gap: 10px;
        min-width: 0;
      }

      .nav-label {
        max-width: 34vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .btn-logout {
        min-height: 36px;
        padding: 0 10px;
        letter-spacing: 0.12em;
      }

      .finder-toolbar {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 18px;
        padding: 8px;
      }

      .toolbar-nav {
        grid-column: 1 / 3;
      }

      .toolbar-nav .toolbar-btn {
        flex: 1;
      }

      .dir-title {
        grid-column: 3 / 5;
        text-align: right;
      }

      .toolbar-search {
        grid-column: 1 / -1;
        min-height: 40px;
        font-size: 16px;
      }

      .toolbar-btn {
        min-width: 0;
        min-height: 40px;
        padding: 0 6px;
        font-size: 9px;
        letter-spacing: 0.06em;
      }

      .toolbar-btn.icon {
        width: auto;
        min-width: 40px;
        font-size: 18px;
      }

      .browser-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      .breadcrumbs {
        gap: 6px;
      }

      .crumb {
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      .file-count {
        font-size: 10px;
      }

      .explorer-body {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .explorer-body.preview-open {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        position: static;
        min-height: 0;
        padding: 12px;
      }

      .preview-panel.open {
        order: -1;
      }

      .preview-frame {
        max-height: 42vh;
      }

      .preview-meta {
        overflow-wrap: anywhere;
      }

      .explorer-item {
        grid-template-columns: 30px minmax(0, 1fr) 58px;
        gap: 10px;
        padding: 12px 10px;
      }

      .file-row {
        grid-template-columns: 30px minmax(0, 1fr) 58px;
        align-items: start;
      }

      .file-header-row {
        display: none;
      }

      .file-row .file-info {
        grid-column: 2;
        grid-row: 1;
      }

      .file-row .file-preview {
        grid-column: 3;
        grid-row: 1 / 4;
      }

      .file-row .file-actions,
      .file-row .file-size,
      .file-row .file-date {
        grid-column: 2;
      }

      .file-row .file-actions {
        grid-row: 4;
        margin-top: 2px;
      }

      .file-row .file-size,
      .file-row .file-date {
        font-size: 10px;
      }

      .file-name {
        font-size: 13px;
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow-wrap: anywhere;
      }

      .file-list {
        gap: 2px;
        padding-top: 2px;
      }

      .folder-grid {
        grid-template-columns: repeat(auto-fill, minmax(94px, 1fr));
        gap: 24px 12px;
        padding-top: 8px;
      }

      .folder-grid .explorer-item {
        grid-template-rows: 64px auto;
        min-height: 108px;
        padding: 10px 6px;
      }

      .folder-icon,
      .file-preview {
        width: 58px;
        height: 42px;
      }

      .folder-icon {
        width: 62px;
        height: 44px;
      }

      .file-actions {
        flex-wrap: wrap;
      }

      .btn-copy,
      .btn-open {
        min-height: 34px;
        padding: 0 10px;
        font-size: 9px;
        letter-spacing: 0.08em;
      }

      .selection-mark {
        left: 10px;
      }

      .empty-state {
        padding: 46px 0;
      }

      footer {
        padding: 12px 16px;
      }
    }

    @media (max-width: 380px) {
      .wordmark {
        letter-spacing: 0.18em;
      }

      .nav-label {
        display: none;
      }

      .toolbar-btn {
        font-size: 8px;
        letter-spacing: 0.04em;
      }

      .folder-grid {
        grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      }
    }

    .empty-state {
      text-align: center;
      padding: 64px 0;
      color: var(--muted);
    }

    .empty-state p { font-family: var(--serif); font-size: 1.25rem; margin-bottom: 8px; }
    .empty-state span { font-size: 11px; letter-spacing: 0.1em; }

    .spinner-inline {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;

<body>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    // Decode username from JWT payload (no lib needed)
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('navUser').textContent = payload.username || '';
    } catch {}

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('currentFolder');
      window.location.href = '/';
    });

    // ── File list ─────────────────────────────────────────
    const initialFolder = new URLSearchParams(window.location.search).get('folder') || localStorage.getItem('currentFolder') || '';
    let currentFolder = initialFolder;
    let currentContents = { folder: '', parent: '', folders: [], files: [] };
    let historyBack = initialFolder ? [''] : [];
    let historyForward = [];
    let selectMode = false;
    let fileSort = 'newest';
    const selectedItems = new Map();

    async function loadFiles(folder = currentFolder, options = {}) {
      const list = document.getElementById('fileList');
      try {
        const res = await fetch(`/browse?folder=${encodeURIComponent(folder)}`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/'; return; }
        if (res.status === 404) {
          if (folder) {
            localStorage.removeItem('currentFolder');
            currentFolder = '';
            await loadFiles('', { skipHistory: true });
            return;
          }
          await loadLegacyFiles();
          setStatus('File explorer API not available. Restart the server to enable folder browsing.', 'error');
          return;
        }
        if (!res.ok) throw new Error('Browse failed');
        const contents = await res.json();
        currentFolder = contents.folder || '';
        persistCurrentFolder();
        currentContents = contents;
        selectedItems.clear();
        updateUploadTarget();
        updateToolbar();
        syncPreviewWithContents(contents);
        renderExplorer(contents);
      } catch {
        list.innerHTML = '<div class="empty-state"><span style="color:var(--error);font-size:12px">Failed to load files. Restart the server and try again.</span></div>';
      }
    }

    async function loadLegacyFiles() {
      const res = await fetch('/files', { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/'; return; }
      if (!res.ok) throw new Error('Files failed');
      const files = await res.json();
      currentFolder = '';
      persistCurrentFolder();
      currentContents = { folder: '', parent: '', folders: [], files: [] };
      updateUploadTarget();
      updateToolbar();
      clearPreview();
      renderExplorer(currentContents);
    }

    function renderExplorer({ folder, folders, files }) {
      const list = document.getElementById('fileList');
      const count = document.getElementById('fileCount');
      const query = searchInput.value.trim().toLowerCase();
      const matches = item => !query || item.name.toLowerCase().includes(query);
      const visibleFolders = folders.filter(matches);
      const visibleFiles = folder ? files.filter(matches).sort(compareFiles) : [];
      const total = visibleFolders.length + visibleFiles.length;
      count.textContent = total ? `${visibleFolders.length} folder${visibleFolders.length === 1 ? '' : 's'} · ${visibleFiles.length} file${visibleFiles.length === 1 ? '' : 's'}` : '';
      renderBreadcrumbs(folder);

      if (!visibleFolders.length && !visibleFiles.length) {
        list.innerHTML = `<div class="empty-state"><p>${folder ? 'Empty folder' : 'No folders yet'}</p><span>${folder ? 'Upload something above or create a folder' : 'Create a folder to begin'}</span></div>`;
        return;
      }

      list.innerHTML = '';
      list.classList.toggle('selecting', selectMode);

      const folderRows = visibleFolders.map(item => ({ type: 'folder', ...item }));
      if (folderRows.length) {
        list.appendChild(createSectionHeader('Folders', folderRows.length));

        const folderGrid = document.createElement('div');
        folderGrid.className = 'folder-grid';
        folderGrid.classList.toggle('selecting', selectMode);
        folderRows.forEach((entry, i) => folderGrid.appendChild(renderExplorerItem(entry, i)));
        list.appendChild(folderGrid);
      }

      if (visibleFiles.length) {
        const filesHeader = createSectionHeader('Files', visibleFiles.length);
        const sort = document.createElement('select');
        sort.className = 'file-sort';
        sort.setAttribute('aria-label', 'Sort files');
        sort.innerHTML = `
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="name">Name A-Z</option>
        `;
        sort.value = fileSort;
        sort.addEventListener('change', () => {
          fileSort = sort.value;
          renderExplorer(currentContents);
        });
        filesHeader.appendChild(sort);
        list.appendChild(filesHeader);

        const header = document.createElement('div');
        header.className = 'file-header-row';
        header.innerHTML = '<span>No.</span><span>Name</span><span>Copy</span><span>Size</span><span>Date uploaded</span><span>Preview</span>';
        list.appendChild(header);
      }

      visibleFiles.forEach((entry, i) => {
        list.appendChild(renderExplorerItem({ type: 'file', ...entry }, i));
      });

      list.querySelectorAll('.btn-copy').forEach(btn => {
        btn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(btn.dataset.url);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 1800);
        });
      });
    }

    function createSectionHeader(label, itemCount) {
      const header = document.createElement('div');
      header.className = 'content-section-header';

      const title = document.createElement('div');
      title.className = 'content-section-title';
      title.textContent = label;

      const count = document.createElement('span');
      count.className = 'content-section-count';
      count.textContent = `(${itemCount})`;
      title.appendChild(count);
      header.appendChild(title);

      return header;
    }

    function compareFiles(a, b) {
      if (fileSort === 'name') {
        return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
      }

      const aTime = Date.parse(a.uploadedAt) || 0;
      const bTime = Date.parse(b.uploadedAt) || 0;
      return fileSort === 'oldest' ? aTime - bTime : bTime - aTime;
    }

    function renderExplorerItem(entry, i) {
        const item = document.createElement('div');
        item.className = `explorer-item ${entry.type === 'file' ? 'file-row' : 'folder-item'}`;
        item.style.animationDelay = `${i * 30}ms`;
        if (selectedItems.has(itemKey(entry))) item.classList.add('selected');

        if (entry.type === 'file') {
          item.innerHTML = `
            <div class="selection-mark">✓</div>
            <div class="file-index">${i + 1}</div>
            <div class="file-info">
              <div class="item-kind">File</div>
              <div class="file-name" title="${escHtml(entry.name)}">${escHtml(displayName(entry.name))}</div>
              <div class="file-url">${escHtml(entry.url)}</div>
            </div>
            <div class="file-actions">
              <button class="btn-copy" data-url="${escHtml(entry.url)}">Copy link</button>
            </div>
            <div class="file-size">${formatBytes(entry.size || 0)}</div>
            <div class="file-date">${formatDate(entry.uploadedAt)}</div>
            ${previewHtml(entry.name, entry.url)}
          `;
        } else {
          item.innerHTML = `
            <div class="selection-mark">✓</div>
            <div class="file-index">${i + 1}</div>
            <div class="folder-icon"></div>
            <div class="file-info">
              <div class="item-kind">Folder</div>
              <div class="file-name" title="${escHtml(entry.name)}">${escHtml(displayName(entry.name))}</div>
            </div>
          `;
          item.addEventListener('click', () => {
            if (selectMode) toggleSelection(entry, item);
            else navigateTo(entry.path);
          });
        }

        if (entry.type === 'file') {
          item.addEventListener('click', event => {
            if (event.target.closest('.file-actions')) return;
            if (selectMode) toggleSelection(entry, item);
            else showPreview(entry);
          });
        }

        return item;
    }

    function renderBreadcrumbs(folder) {
      const breadcrumbs = document.getElementById('breadcrumbs');
      const parts = folder ? folder.split('/') : [];
      const crumbs = [{ label: 'Home', path: '' }];

      parts.forEach((part, index) => {
        crumbs.push({
          label: part,
          path: parts.slice(0, index + 1).join('/'),
        });
      });

      breadcrumbs.innerHTML = '';
      crumbs.forEach((crumb, index) => {
        if (index) {
          const separator = document.createElement('span');
          separator.className = 'crumb-separator';
          separator.textContent = '/';
          breadcrumbs.appendChild(separator);
        }

        const button = document.createElement('button');
        button.className = 'crumb';
        button.type = 'button';
        button.textContent = crumb.label;
        button.addEventListener('click', () => navigateTo(crumb.path));
        breadcrumbs.appendChild(button);
      });
    }

    function navigateTo(folder) {
      const target = folder || '';
      if (target === currentFolder) return;
      historyBack.push(currentFolder);
      historyForward = [];
      loadFiles(target, { skipHistory: true });
    }

    function persistCurrentFolder() {
      if (currentFolder) localStorage.setItem('currentFolder', currentFolder);
      else localStorage.removeItem('currentFolder');

      const url = new URL(window.location.href);
      if (currentFolder) url.searchParams.set('folder', currentFolder);
      else url.searchParams.delete('folder');
      window.history.replaceState(null, '', url);
    }

    function previewHtml(name, url) {
      const safeName = escHtml(name);
      const safeUrl = escHtml(url);
      const ext = name.split('.').pop().toLowerCase();

      if (['apng', 'avif', 'gif', 'jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
        return `<div class="file-preview" aria-label="Preview ${safeName}"><img src="${safeUrl}" alt="${safeName}" loading="lazy" /></div>`;
      }

      if (['mp4', 'ogg', 'ogv', 'mov', 'webm'].includes(ext)) {
        return `<div class="file-preview" aria-label="Preview ${safeName}"><video src="${safeUrl}" muted preload="metadata"></video></div>`;
      }

      if (['aac', 'flac', 'm4a', 'mp3', 'wav'].includes(ext)) {
        return `<div class="file-preview" aria-label="Preview ${safeName}">Audio</div>`;
      }

      return `<div class="file-preview" aria-label="Preview ${safeName}">File</div>`;
    }

    // ── Toolbar actions ───────────────────────────────────
    const fileInput = document.getElementById('fileInput');
    const folderInput = document.getElementById('folderInput');
    const statusEl = document.getElementById('uploadStatus');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const createFolderBtn = document.getElementById('createFolderBtn');
    const currentFolderNote = document.getElementById('currentFolderNote');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const dirTitle = document.getElementById('dirTitle');
    const searchInput = document.getElementById('searchInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadFolderBtn = document.getElementById('uploadFolderBtn');
    const selectBtn = document.getElementById('selectBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const mobileActions = document.getElementById('mobileActions');
    const mobileActionsBtn = document.getElementById('mobileActionsBtn');
    const mobileActionsMenu = document.getElementById('mobileActionsMenu');
    const mobileSelectAction = document.getElementById('mobileSelectAction');
    const mobileDeleteAction = document.getElementById('mobileDeleteAction');
    const previewPanel = document.getElementById('previewPanel');
    const dropZone = document.getElementById('dropZone');
    const explorerBody = document.getElementById('explorerBody');
    const previewFrame = document.getElementById('previewFrame');
    const previewName = document.getElementById('previewName');
    const previewMeta = document.getElementById('previewMeta');
    const mobileQuery = window.matchMedia('(max-width: 640px)');
    let currentPreviewPath = '';
    let statusTimer = null;

    createFolderBtn.addEventListener('click', createFolder);
    uploadBtn.addEventListener('click', () => {
      if (!currentFolder) {
        setStatus('Open a folder before uploading.', 'error');
        return;
      }
      fileInput.click();
    });
    uploadFolderBtn.addEventListener('click', () => {
      if (!currentFolder) {
        setStatus('Open a folder before uploading.', 'error');
        return;
      }
      folderInput.click();
    });
    selectBtn.addEventListener('click', toggleSelectMode);
    deleteBtn.addEventListener('click', deleteSelected);
    mobileActionsBtn.addEventListener('click', event => {
      event.stopPropagation();
      toggleMobileActions();
    });
    mobileActionsMenu.addEventListener('click', event => {
      const actionButton = event.target.closest('[data-mobile-action]');
      if (!actionButton || actionButton.disabled) return;
      runMobileAction(actionButton.dataset.mobileAction);
    });
    document.addEventListener('click', event => {
      if (mobileActionsMenu.hidden || mobileActions.contains(event.target)) return;
      closeMobileActions();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeMobileActions();
    });
    searchInput.addEventListener('input', () => renderExplorer(currentContents));
    mobileQuery.addEventListener('change', () => {
      closeMobileActions();
      if (mobileQuery.matches) clearPreview();
      renderExplorer(currentContents);
    });
    backBtn.addEventListener('click', () => {
      if (!historyBack.length) return;
      historyForward.push(currentFolder);
      loadFiles(historyBack.pop(), { skipHistory: true });
    });
    forwardBtn.addEventListener('click', () => {
      if (!historyForward.length) return;
      historyBack.push(currentFolder);
      loadFiles(historyForward.pop(), { skipHistory: true });
    });
    fileInput.addEventListener('change', () => { uploadFiles([...fileInput.files]); fileInput.value = ''; });
    folderInput.addEventListener('change', () => { uploadFiles([...folderInput.files]); folderInput.value = ''; });
    dropZone.addEventListener('dragenter', handleDragEnter);
    dropZone.addEventListener('dragover', handleDragOver);
    dropZone.addEventListener('dragleave', handleDragLeave);
    dropZone.addEventListener('drop', handleDrop);

    async function uploadFiles(files) {
      const uploads = normalizeUploads(files);
      if (!uploads.length) return;
      if (!currentFolder) {
        setStatus('Open a folder before uploading.', 'error');
        return;
      }
      setStatus('', '');
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      let done = 0;
      const errors = [];

      for (const upload of uploads) {
        const fd = new FormData();
        const uploadFolder = folderForUpload(upload);
        fd.append('folder', uploadFolder);
        fd.append('file', upload.file);
        try {
          const res = await fetch('/upload', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
            body: fd,
          });
          if (!res.ok) {
            errors.push(`${upload.relativePath || upload.file.name}: ${await uploadErrorMessage(res)}`);
          }
        } catch {
          errors.push(`${upload.relativePath || upload.file.name}: Network error`);
        }
        done++;
        progressBar.style.width = `${(done / uploads.length) * 100}%`;
      }

      setTimeout(() => { progressWrap.style.display = 'none'; }, 600);

      if (errors.length) {
        setStatus(`${done - errors.length} uploaded, ${errors.length} failed. ${errors.join(' ')}`, 'error');
      } else {
        setStatus(`${done} file${done === 1 ? '' : 's'} uploaded.`, 'success');
      }

      loadFiles();
    }

    function normalizeUploads(files) {
      return files
        .filter(file => file && file.size >= 0)
        .map(file => ({ file, relativePath: file.webkitRelativePath || file.relativePath || file.name }));
    }

    function folderForUpload(upload) {
      const parts = String(upload.relativePath || upload.file.name).split('/').filter(Boolean);
      parts.pop();
      const nestedFolder = parts.join('/');
      return [selectedFolder(), nestedFolder].filter(Boolean).join('/');
    }

    async function handleDrop(event) {
      event.preventDefault();
      event.stopPropagation();
      dropZone.classList.remove('drag-over');

      if (!currentFolder) {
        setStatus('Open a folder before uploading.', 'error');
        return;
      }

      const files = await filesFromDrop(event.dataTransfer);
      if (!files.length) {
        setStatus('No supported files found in that drop.', 'error');
        return;
      }
      uploadFiles(files);
    }

    function handleDragEnter(event) {
      if (!hasDroppableItems(event.dataTransfer)) return;
      event.preventDefault();
      dropZone.classList.add('drag-over');
    }

    function handleDragOver(event) {
      if (!hasDroppableItems(event.dataTransfer)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = currentFolder ? 'copy' : 'none';
      dropZone.classList.add('drag-over');
    }

    function handleDragLeave(event) {
      if (dropZone.contains(event.relatedTarget)) return;
      dropZone.classList.remove('drag-over');
    }

    function hasDroppableItems(dataTransfer) {
      return dataTransfer && Array.from(dataTransfer.types || []).includes('Files');
    }

    async function filesFromDrop(dataTransfer) {
      const items = Array.from(dataTransfer.items || []);
      if (!items.length) return Array.from(dataTransfer.files || []);

      const uploads = [];
      for (const item of items) {
        if (item.kind !== 'file') continue;
        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
        if (entry) {
          uploads.push(...await filesFromEntry(entry));
        } else {
          const file = item.getAsFile();
          if (file) uploads.push(file);
        }
      }
      return uploads;
    }

    async function filesFromEntry(entry, parentPath = '') {
      if (entry.isFile) {
        return new Promise(resolve => {
          entry.file(file => {
            file.relativePath = parentPath ? `${parentPath}/${file.name}` : file.name;
            resolve([file]);
          }, () => resolve([]));
        });
      }

      if (!entry.isDirectory) return [];

      const dirPath = parentPath ? `${parentPath}/${entry.name}` : entry.name;
      const reader = entry.createReader();
      const entries = await readAllDirectoryEntries(reader);
      const nested = await Promise.all(entries.map(child => filesFromEntry(child, dirPath)));
      return nested.flat();
    }

    async function readAllDirectoryEntries(reader) {
      const entries = [];
      while (true) {
        const batch = await new Promise(resolve => reader.readEntries(resolve, () => resolve([])));
        if (!batch.length) break;
        entries.push(...batch);
      }
      return entries;
    }

    async function createFolder() {
      const folder = prompt('New folder name');
      if (!folder) return;

      createFolderBtn.disabled = true;
      try {
        const res = await fetch('/folders', {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ parent: currentFolder, folder }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          setStatus(body.error || 'Could not create folder', 'error');
          return;
        }
        await loadFiles(currentFolder);
        setStatus(`Folder created: ${body.folder.split('/').pop()}`, 'success');
      } catch {
        setStatus('Could not create folder', 'error');
      } finally {
        createFolderBtn.disabled = false;
      }
    }

    function selectedFolder() {
      return currentFolder;
    }

    function toggleMobileActions() {
      if (mobileActionsMenu.hidden) openMobileActions();
      else closeMobileActions();
    }

    function openMobileActions() {
      mobileActionsMenu.hidden = false;
      mobileActionsBtn.setAttribute('aria-expanded', 'true');
    }

    function closeMobileActions() {
      mobileActionsMenu.hidden = true;
      mobileActionsBtn.setAttribute('aria-expanded', 'false');
    }

    function runMobileAction(action) {
      closeMobileActions();

      if (action === 'new-folder') {
        createFolder();
        return;
      }

      if (action === 'upload-file') {
        if (!currentFolder) {
          setStatus('Open a folder before uploading.', 'error');
          return;
        }
        fileInput.click();
        return;
      }

      if (action === 'upload-folder') {
        if (!currentFolder) {
          setStatus('Open a folder before uploading.', 'error');
          return;
        }
        folderInput.click();
        return;
      }

      if (action === 'select') {
        toggleSelectMode();
        return;
      }

      if (action === 'delete') {
        deleteSelected();
      }
    }

    function showPreview(file) {
      if (mobileQuery.matches) return;

      currentPreviewPath = file.path;
      explorerBody.classList.add('preview-open');
      previewPanel.classList.add('open');
      previewFrame.innerHTML = previewContent(file.name, file.url);
      previewName.textContent = file.name;
      previewMeta.innerHTML = `
        <div>Size: ${formatBytes(file.size || 0)}</div>
        <div>Uploaded: ${formatDate(file.uploadedAt)}</div>
        <div>Path: ${escHtml(file.path)}</div>
      `;
    }

    function clearPreview() {
      currentPreviewPath = '';
      explorerBody.classList.remove('preview-open');
      previewPanel.classList.remove('open');
      previewFrame.textContent = 'Preview';
      previewName.textContent = '';
      previewMeta.textContent = '';
    }

    function syncPreviewWithContents(contents) {
      if (!currentPreviewPath) return;
      const previewStillExists = contents.files.some(file => file.path === currentPreviewPath);
      if (!previewStillExists) clearPreview();
    }

    function previewContent(name, url) {
      const safeName = escHtml(name);
      const safeUrl = escHtml(url);
      const ext = name.split('.').pop().toLowerCase();

      if (['apng', 'avif', 'gif', 'jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
        return `<img src="${safeUrl}" alt="${safeName}" />`;
      }
      if (['mp4', 'ogg', 'ogv', 'mov', 'webm'].includes(ext)) {
        return `<video src="${safeUrl}" controls preload="metadata"></video>`;
      }
      if (['aac', 'flac', 'm4a', 'mp3', 'wav'].includes(ext)) {
        return `<audio src="${safeUrl}" controls></audio>`;
      }
      return 'Preview';
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
      return `${(bytes / Math.pow(1024, index)).toFixed(index ? 1 : 0)} ${units[index]}`;
    }

    function formatDate(value) {
      if (!value) return '-';
      return new Intl.DateTimeFormat(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      }).format(new Date(value));
    }

    function displayName(name) {
      if (!mobileQuery.matches || name.length <= 16) return name;

      const dotIndex = name.lastIndexOf('.');
      if (dotIndex > 0 && dotIndex < name.length - 1) {
        const base = name.slice(0, dotIndex);
        const ext = name.slice(dotIndex);
        return `${base.slice(0, 8)}.....${base.slice(-1)}${ext}`;
      }

      return `${name.slice(0, 8)}.....${name.slice(-4)}`;
    }

    function itemKey(item) {
      return `${item.type}:${item.path}`;
    }

    function toggleSelection(item, element) {
      const key = itemKey(item);
      if (selectedItems.has(key)) {
        selectedItems.delete(key);
        element.classList.remove('selected');
      } else {
        selectedItems.set(key, { type: item.type, path: item.path });
        element.classList.add('selected');
      }
      updateToolbar();
    }

    function toggleSelectMode() {
      selectMode = !selectMode;
      selectedItems.clear();
      selectBtn.classList.toggle('active', selectMode);
      selectBtn.textContent = selectMode ? 'Done' : 'Select';
      updateToolbar();
      renderExplorer(currentContents);
    }

    async function deleteSelected() {
      const items = [...selectedItems.values()];
      if (!items.length) return;
      if (!confirm(`Delete ${items.length} selected item${items.length === 1 ? '' : 's'}?`)) return;

      try {
        const res = await fetch('/items', {
          method: 'DELETE',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ items }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          setStatus(body.error || 'Delete failed', 'error');
          return;
        }
        if (items.some(item => item.path === currentPreviewPath || (item.type === 'folder' && currentPreviewPath.startsWith(item.path + '/')))) {
          clearPreview();
        }
        selectedItems.clear();
        setStatus(`${body.deleted || 0} deleted.`, 'success');
        await loadFiles(currentFolder, { skipHistory: true });
      } catch {
        setStatus('Delete failed', 'error');
      }
    }

    function updateToolbar() {
      dirTitle.textContent = currentFolder ? currentFolder.split('/').pop() : 'Home';
      backBtn.disabled = !historyBack.length;
      forwardBtn.disabled = !historyForward.length;
      uploadBtn.disabled = !currentFolder;
      uploadFolderBtn.disabled = !currentFolder;
      deleteBtn.disabled = !selectedItems.size;
      mobileSelectAction.textContent = selectMode ? 'Done' : 'Select';
      mobileDeleteAction.disabled = !selectedItems.size;
      currentFolderNote.textContent = currentFolder ? `Uploading into /${currentFolder}` : '';
    }

    function updateUploadTarget() {
      fileInput.disabled = !currentFolder;
      folderInput.disabled = !currentFolder;
    }

    async function uploadErrorMessage(res) {
      try {
        const body = await res.json();
        return body.error || `Upload failed (${res.status})`;
      } catch {
        return `Upload failed (${res.status})`;
      }
    }

    function setStatus(msg, type) {
      clearTimeout(statusTimer);
      statusEl.textContent = msg;
      statusEl.className = 'upload-status' + (type ? ` ${type}` : '');
      if (!msg) return;

      statusTimer = setTimeout(() => {
        statusEl.textContent = '';
        statusEl.className = 'upload-status';
      }, 3000);
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    updateUploadTarget();
    loadFiles(initialFolder, { skipHistory: true });
  </script>
  <script src="/pwa.js" defer></script>
</body>
</html>
